<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Predict Segment</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8;
               display: flex; justify-content: center; padding: 40px; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { color: #2d3748; margin-bottom: 24px; }
        label { display: block; margin-bottom: 6px; color: #4a5568; font-weight: bold; }
        input  { width: 100%; padding: 10px; border: 1px solid #cbd5e0;
                 border-radius: 6px; margin-bottom: 18px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #4a90d9; color: white;
                 border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #357abd; }
        .result { margin-top: 24px; padding: 16px; background: #ebf8ff;
                  border-left: 4px solid #4a90d9; border-radius: 6px; color: #2b6cb0; font-size: 18px; }
        small { display: block; color: #718096; margin-top: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔍 Predict Customer Segment</h2>
        <form action="/predict" method="POST">
            <label>Recency (days since last purchase)</label>
            <input type="number" name="recency" placeholder="e.g. 30" required min="0" />
            <small>Lower = more recent customer</small>

            <label style="margin-top:10px;">Frequency (number of orders)</label>
            <input type="number" name="frequency" placeholder="e.g. 5" required min="1" />

            <label style="margin-top:10px;">Monetary (total spend in £)</label>
            <input type="number" step="0.01" name="monetary" placeholder="e.g. 250.00" required min="0" />

            <button type="submit" style="margin-top:10px;">Predict Segment</button>
        </form>

        {% if results %}
        <div class="result">
            <strong>Predicted Segment:</strong> {{ results }}
        </div>
        {% endif %}
    </div>
</body>
</html>
